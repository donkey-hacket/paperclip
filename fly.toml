app = 'paperclip-z1chxq'
primary_region = 'iad'

[build]

[[mounts]]
  source = 'paperclip'
  destination = '/paperclip'

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
