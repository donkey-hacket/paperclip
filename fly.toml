# fly.toml app configuration file generated for paperclip-z1chxq on 2026-04-10T09:06:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'paperclip-z1chxq'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"
[[mounts]]
  source = 'paperclip'
  destination = '/paperclip'

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  
[env]
  # Fix permission issues by using mounted volume for writable data
  PAPERCLIP_HOME = "/paperclip"
  
  # OpenCode adapter configuration for free models
  OPENCODE_PROVIDER = "deepinfra"
  OPENCODE_BASE_URL = "https://api.deepinfra.com/v1"
  OPENCODE_API_KEY = "YOUR_DEEPINFRA_API_KEY"
  
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
